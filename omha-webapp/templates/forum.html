<!-- templates/forum.html -->
{% extends "base.html" %}

{% block content %}
    <h2>Diễn đàn</h2>
    <a href="{{ url_for('create_post') }}" class="btn btn-primary mb-4">Đăng bài mới</a>

    <div class="list-group">
        {% for post in posts %}
            <a href="{{ url_for('view_post', post_id=post.id) }}" class="list-group-item list-group-item-action">
                <h5>{{ post.title }}</h5>
                <p>{{ post.content[:100] }}...</p>
                <small>{{ post.created_at.strftime('%d/%m/%Y %H:%M') }} - Từ {{ post.user.username }}</small>
            </a>
        {% endfor %}
    </div>

    <script>
        // Show skeleton loader on page load, then hide when content is ready
        document.addEventListener('DOMContentLoaded', function() {
            const posts = document.querySelectorAll('.list-group-item');
            
            // If no posts, show a helpful message
            if (posts.length === 0) {
                const container = document.querySelector('.list-group');
                if (container) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.className = 'alert alert-info';
                    emptyMsg.innerHTML = '<p>Chưa có bài viết nào. Hãy <a href="{{ url_for("create_post") }}">đăng bài mới</a> để bắt đầu!</p>';
                    container.parentElement.appendChild(emptyMsg);
                }
            }
            
            // Hide skeleton loader if it's showing
            if (window.skeletonLoader) {
                window.skeletonLoader.hide();
            }
        });
    </script>
{% endblock %}
