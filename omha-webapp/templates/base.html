<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OMHA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .navbar-nav .nav-link {
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .navbar-nav .btn {
      margin-left: 10px; /* Khoảng cách giữa các nút */
    }

    .theme-toggle-btn {
      min-width: 48px;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">OMHA</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/diary">Nhật ký</a></li>
          <li class="nav-item"><a class="nav-link" href="/forum">Diễn đàn</a></li>
          <li class="nav-item"><a class="nav-link" href="/video">Trò chuyện</a></li>
          <li class="nav-item"><a class="nav-link" href="/articles">Bài viết</a></li>
          <li class="nav-item"><a class="nav-link" href="/chatbot">Chatbot</a></li>
        </ul>

        <div class="d-flex ms-auto align-items-center">
          <div class="btn-group btn-group-sm me-2 accessibility-controls" role="group" aria-label="Chuyển đổi kích thước và độ tương phản">
            <button id="decrease-text" type="button" class="btn btn-outline-primary" aria-label="Giảm kích thước chữ">A–</button>
            <button id="increase-text" type="button" class="btn btn-outline-primary" aria-label="Tăng kích thước chữ">A+</button>
            <button id="contrast-toggle" type="button" class="btn btn-outline-primary" aria-pressed="false" aria-label="Chuyển đổi độ tương phản">⚡</button>
          </div>
          <button id="theme-toggle" type="button" class="btn btn-outline-primary btn-sm me-2 theme-toggle-btn" aria-label="Bật/tắt chế độ tối">🌙</button>
          {% if current_user.is_authenticated %}
            <span class="navbar-text text-white me-2">Chào, {{ current_user.username }}!</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Đăng xuất</a>
          {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm me-2">Đăng nhập</a>
            <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-sm">Đăng ký</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="bg-light text-center py-3">
    <p class="mb-0">© 2025 OMHA. Đồng hành cùng sức khỏe tâm lý của bạn.</p>
  </footer>

  <script>
    (function () {
      const themeToggle = document.getElementById('theme-toggle');
      const increaseText = document.getElementById('increase-text');
      const decreaseText = document.getElementById('decrease-text');
      const contrastToggle = document.getElementById('contrast-toggle');
      const storageKey = 'omhaAccessibility';
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedPrefs = JSON.parse(localStorage.getItem(storageKey) || '{}');
      const prefs = {
        theme: savedPrefs.theme || (prefersDark ? 'dark' : 'light'),
        textSize: savedPrefs.textSize || 'normal',
        highContrast: savedPrefs.highContrast || false,
      };

      function savePrefs() {
        localStorage.setItem(storageKey, JSON.stringify(prefs));
      }

      function applyTheme(theme) {
        document.body.classList.toggle('dark-theme', theme === 'dark');
        if (themeToggle) {
          themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
          themeToggle.title = theme === 'dark' ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối';
        }
      }

      function applyTextSize(size) {
        document.body.classList.toggle('large-text', size === 'large');
        document.body.classList.toggle('xlarge-text', size === 'xlarge');
        if (decreaseText) {
          decreaseText.disabled = size === 'normal';
        }
        if (increaseText) {
          increaseText.disabled = size === 'xlarge';
        }
      }

      function applyContrast(enabled) {
        document.body.classList.toggle('high-contrast', enabled);
        if (contrastToggle) {
          contrastToggle.textContent = enabled ? '♿' : '⚡';
          contrastToggle.setAttribute('aria-pressed', enabled.toString());
          contrastToggle.title = enabled ? 'Chuyển sang độ tương phản chuẩn' : 'Bật độ tương phản cao';
        }
      }

      function updateControls() {
        applyTheme(prefs.theme);
        applyTextSize(prefs.textSize);
        applyContrast(prefs.highContrast);
        savePrefs();
      }

      if (themeToggle) {
        themeToggle.addEventListener('click', function () {
          prefs.theme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
          updateControls();
        });
      }

      if (increaseText) {
        increaseText.addEventListener('click', function () {
          if (prefs.textSize === 'normal') {
            prefs.textSize = 'large';
          } else if (prefs.textSize === 'large') {
            prefs.textSize = 'xlarge';
          }
          updateControls();
        });
      }

      if (decreaseText) {
        decreaseText.addEventListener('click', function () {
          if (prefs.textSize === 'xlarge') {
            prefs.textSize = 'large';
          } else if (prefs.textSize === 'large') {
            prefs.textSize = 'normal';
          }
          updateControls();
        });
      }

      if (contrastToggle) {
        contrastToggle.addEventListener('click', function () {
          prefs.highContrast = !prefs.highContrast;
          updateControls();
        });
      }

      updateControls();
    })();
  </script>
  <script src="{{ url_for('static', filename='skeleton-loader.js') }}"></script>
</body>

</html>
