<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>OMHA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .navbar-nav .nav-link {
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .navbar-nav .btn {
      margin-left: 10px; /* Khoảng cách giữa các nút */
    }

    .theme-toggle-btn {
      min-width: 48px;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">OMHA</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/diary">Nhật ký</a></li>
          <li class="nav-item"><a class="nav-link" href="/forum">Diễn đàn</a></li>
          <li class="nav-item"><a class="nav-link" href="/video">Trò chuyện</a></li>
          <li class="nav-item"><a class="nav-link" href="/articles">Bài viết</a></li>
          <li class="nav-item"><a class="nav-link" href="/chatbot">Chatbot</a></li>
        </ul>

        <div class="d-flex ms-auto align-items-center">
          <button id="theme-toggle" type="button" class="btn btn-outline-primary btn-sm me-2 theme-toggle-btn" aria-label="Bật/tắt chế độ tối">🌙</button>
          {% if current_user.is_authenticated %}
            <span class="navbar-text text-white me-2">Chào, {{ current_user.username }}!</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Đăng xuất</a>
          {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm me-2">Đăng nhập</a>
            <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-sm">Đăng ký</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="bg-light text-center py-3">
    <p class="mb-0">© 2025 OMHA. Đồng hành cùng sức khỏe tâm lý của bạn.</p>
  </footer>

  <script>
    (function () {
      const themeToggle = document.getElementById('theme-toggle');
      const storageKey = 'omhaTheme';
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem(storageKey);
      const currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');

      function applyTheme(theme) {
        document.body.classList.toggle('dark-theme', theme === 'dark');
        if (themeToggle) {
          themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
          themeToggle.title = theme === 'dark' ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối';
        }
      }

      applyTheme(currentTheme);

      if (themeToggle) {
        themeToggle.addEventListener('click', function () {
          const nextTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
          localStorage.setItem(storageKey, nextTheme);
          applyTheme(nextTheme);
        });
      }
    })();
  </script>
</body>

</html>
